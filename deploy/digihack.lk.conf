# ==================== HTTP to HTTPS Redirect for digihack.lk ====================
server {
    listen 80;
    server_name digihack.lk www.digihack.lk;
    return 301 https://$host$request_uri;
}

# ==================== Main HTTPS Server Block for digihack.lk ====================
server {
    listen 443 ssl http2;
    server_name digihack.lk www.digihack.lk;

    ssl_certificate /etc/nginx/ssl/digihack-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/digihack-key.pem;

    client_max_body_size 20M;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---------- Frontend (Next.js) ----------
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
